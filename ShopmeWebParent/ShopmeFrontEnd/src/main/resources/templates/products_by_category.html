<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments :: page_head(${pageTitle},'none')" />
<meta charset="ISO-8859-1">
<title>Welcome to TechStore</title>
</head>

<body>

	<div th:replace="navigation::header_menu"></div>
	<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
		<div class="container">
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
				aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarNav">
				<ul class="navbar-nav">
					<li class="nav-item">
						<a class="nav-link" th:href="@{/}" style="font-weight: bold; color: rgb(255, 202, 104);">Tất
							cả</a>
					</li>
					<!-- Duyệt qua danh mục từ danh sách cat.name -->
					<div th:each="cat: ${listCategories}">
						<li class="nav-item" style="font-weight: bold;">
							<a class="nav-link" style="color: rgb(255, 202, 104);"
								th:href="@{'/category/'+${cat.alias}}" th:text="${cat.name}"></a>
						</li>
					</div>
				</ul>
			</div>
		</div>
	</nav>
	<div th:if="${listCategoryParents != null && !listCategoryParents.empty}" style="background-color: darkgray;">
		<div class="row" style="margin-left:20px;">
			<div class="col">
				<nav>
					<ol class="breadcrumb">
						<li class="breadcrumb-item">
							<a th:href="@{/}">Home</a>
						</li>

						<th:block th:each="parent : ${listCategoryParents}">
							<li class="breadcrumb-item">
								<a th:href="@{'/category/'+ ${parent.alias}}">[[${parent.name}]]</a>
							</li>
						</th:block>
					</ol>
				</nav>
			</div>
		</div>
	</div>
	<div class="container mt-4">
		<div class="row product-list">
			<th:block th:each="product : ${listProducts}">
				<div class="col-md-4">
					<div class="card">
						<img th:src="@{${product.mainImagePath}}" width="150px" height="300px" class="card-img-top" alt="[[${product.name}]]">
						<div class="card-body"style="text-align: center;">
							<h5 class="card-title" th:text="${product.name}"></h5>
							<button class="btn "style="text-align: center; background-color:rgb(255, 202, 104);">Thêm vào giỏ hàng</button>
						</div>
					</div>
				</div>
			</th:block>
		</div>
	</div>

	<div th:replace="fragments :: pagination('/category/' + ${category.alias} ,'product')"></div>
	<div th:replace="navigation :: footer_menu" style="margin-top: 20px;"></div>
	<style>
		.card {
			height: 100%;
			/* Đặt chiều cao cố định cho tất cả các khối */
		}
	</style>
	<script>
		$(document).ready(function () {
			// Tự động bật carousel khi trang đã tải
			$('#slideshow').carousel();
			// Bắt đầu chạy slideshow tự động
			$('#slideshow').carousel('cycle');
		});
	</script>
</body>

</html>
