<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments :: page_head(${pageTitle},'none')" />
<meta charset="UTF-8">
<title>Welcome to TechStore</title>
<link rel="stylesheet" href="your-styles.css">
</head>

<body>
    <header th:replace="navigation::header_menu"></header>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}" style="font-weight: bold; color: #FFCA68;">Tất cả</a>
                    </li>
                    <th:block th:each="cat: ${listCategories}">
                        <li class="nav-item" style="font-weight: bold;">
                            <a class="nav-link" style="color: #FFCA68;"
                                th:href="@{'/category/'+${cat.alias}}" th:text="${cat.name}"></a>
                        </li>
                    </th:block>
                </ul>
            </div>
        </div>
    </nav>

    <div th:replace="breadcrumb::content"></div>

    <div class="row">
        <div class="col-sm">
            <img th:src="@{${product.mainImagePath}}" class="img-fluid" />
        </div>
        <div class="col-sm">
            <div>
                <h1 th:text="${product.name}"></h1>
            </div>
            <div>
                <span>Brand: <span th:text="${product.brand.name}"></span></span>
            </div>
            <div>
                <span th:if="${product.discountPercent <= 0}">Price: [[${product.price}]] triệu VND</span>
                <del th:if="${product.discountPercent > 0}">Price: [[${product.price}]] triệu VND</del>
            </div>
            <div th:if="${product.discountPercent > 0}">
                <div style="font-size: larger; color: darkred;">Price: [[${product.discountPrice}]] triệu VND</div>
                (Giảm [[${product.discountPercent}]]%)
            </div>
            <div>&nbsp;</div>
            <div th:utext="${product.shortDescription}"></div>
        </div>
        <div class="col-sm-2">
            <div>
                <span th:if="${product.inStock}" class="text-success"><b>Còn Hàng</b></span>
                <span th:unless="${product.inStock}" class="text-danger"><b>Hết Hàng</b></span>
            </div>
            <div class="mt-2">
                <input type="text" size="5" />
            </div>
            <div class="mt-3">
                <button class="btn" style="text-align: center; background-color: #FFCA68;">Thêm vào giỏ hàng</button>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-sm">
            <hr />
            <h3>Mô tả sản phẩm:</h3>
            <div th:utext="${product.fullDescription}"></div>
        </div>
        <div class="col-sm">
            <hr />
            <h3>Chi tiết thông tin sản phẩm:</h3>
            <th:block th:each="detail :${product.details}">
                <div>
                    <b th:text="${detail.name}">Product Detail</b>:
                    <span th:text="${detail.value}">Value</span>
                </div>
            </th:block>
        </div>
    </div>

    <footer th:replace="navigation :: footer_menu" style="margin-top: 20px;"></footer>

    <style>
        /* Add your custom styles in your-styles.css */
    </style>
    <script src="your-scripts.js"></script>
</body>
</html>
